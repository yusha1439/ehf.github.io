name: Deploy Site

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate gallery manifest
        run: |
          echo "Scanning photos folder..."
          if [ -d "photos" ] && [ "$(ls photos/ 2>/dev/null)" ]; then
            files=$(ls photos/ | grep -iE '\.(jpg|jpeg|png|gif|webp)$' | sort)
            json="["
            first=true
            while IFS= read -r f; do
              [ -z "$f" ] && continue
              if [ "$first" = true ]; then first=false; else json="$json,"; fi
              json="$json\"$f\""
            done <<< "$files"
            json="$json]"
          else
            json="[]"
          fi
          echo "$json" > gallery.json
          echo "gallery.json: $json"

      - name: Generate logo manifest
        run: |
          echo "Scanning logos folder..."
          if [ -d "logos" ]; then
            file=$(ls logos/ | grep -iE '\.(jpg|jpeg|png|gif|webp|svg)$' | head -1)
            if [ -n "$file" ]; then
              echo "\"$file\"" > logo.json
              echo "Logo: $file"
            else
              echo "null" > logo.json
            fi
          else
            echo "null" > logo.json
          fi

      - name: Commit manifests
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gallery.json logo.json
          git diff --staged --quiet || git commit -m "chore: update gallery and logo manifests [skip ci]"
          git push

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
